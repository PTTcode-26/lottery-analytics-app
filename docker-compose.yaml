version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lottery_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lottery_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lottery_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-lottery_analytics}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lottery_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: lottery_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lottery_user}:${POSTGRES_PASSWORD:-lottery_secure_password}@db:5432/${POSTGRES_DB:-lottery_analytics}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-super_secret_jwt_key_123456}
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: lottery_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data: